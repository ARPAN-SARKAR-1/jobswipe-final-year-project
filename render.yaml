services:
  - type: web
    name: swipe-for-success-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: UPLOAD_DIR
        value: uploads
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CAPTCHA_ENABLED
        value: "true"
      - key: EMAIL_VERIFICATION_REQUIRED
        value: "true"
      - key: TWOFA_REQUIRED_ROLES
        value: OWNER,ADMIN,RECRUITER
      - key: EMAIL_PROVIDER
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: OTP_EXPIRE_MINUTES
        value: "5"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      - key: EMAIL_OTP_RESEND_COOLDOWN_SECONDS
        value: "60"
      - key: CAPTCHA_EXPIRE_MINUTES
        value: "5"
      - key: TRUSTED_DEVICE_DAYS
        value: "30"
      - key: TRUSTED_DEVICE_COOKIE_NAME
        value: swipe_trusted_device
      - key: OWNER_EMAILS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: INITIAL_TEAM_PASSWORD
        sync: false
      - key: RESET_TEAM_PASSWORDS
        value: "false"
