name: QA

on:
  push:
  pull_request:

jobs:
  build-and-sanity:
    runs-on: ubuntu-latest
    env:
      ENV: test
      DATABASE_URL: mysql+pymysql://ci_user:password@127.0.0.1:3306/jobswipe_ci
      JWT_SECRET: test_ci_jwt_secret_for_qa_only_change_me
      FRONTEND_URL: http://127.0.0.1:3000
      EMAIL_PROVIDER: console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend install
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend E2E catalogue
        working-directory: frontend
        run: npm run test:e2e -- --list

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend install
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Backend compile
        working-directory: backend
        run: python -m compileall app

      - name: Route import check
        working-directory: backend
        run: python scripts/check_routes.py

      - name: Security sanity check
        working-directory: backend
        run: python scripts/security_sanity_check.py
